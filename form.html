<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Uzoka Shadrack Chinedu">
    <meta name="description"
        content="The page allows the users to access the different products available and carry out a review on it">
    <title>Product Review Form</title>
    <link rel="stylesheet" href="styles/form.css">
    <script defer src="scripts/form.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Roboto&family=Roboto+Mono:ital,wght@0,100;1,100&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <h1>Product Review</h1>
    </header>

    <main>
        <form method="get" action="review.html" class="review-form">

            <!-- PRODUCT NAME -->


            <label for="product">Product Name</label>
            <select id="product" name="product" required>
                <option value="" disabled selected>Select a Product ...</option>
                <option value="Phone">Phone</option>
                <option value="Generator">Generator</option>
                <option value="Spanner">Spanner</option>
                <option value="Television">Television</option>
            </select>

            <!-- OVERALL RATING -->

            <fieldset class="rating-field">
                <legend>Overall Rating</legend>

                <label for="rate1">
                    ☆
                    <br>
                    <input type="radio" id="rate1" name="rating" value="1" required>

                </label>
                <label for="rate2">
                    ☆☆
                    <br>
                    <input type="radio" id="rate2" name="rating" value="2" required>
                </label>
                <label for="rate3">
                    ☆☆☆
                    <br>
                    <input type="radio" id="rate3" name="rating" value="3" required>
                </label>
                <label for="rate4">
                    ☆☆☆☆
                    <br>
                    <input type="radio" id="rate4" name="rating" value="4" required>
                </label>
                <label for="rate5">
                    ☆☆☆☆☆
                    <br>
                    <input type="radio" id="rate5" name="rating" value="5" required>
                </label>
            </fieldset>

            <!-- DATE INSTALLED -->
            <label for="install-date">Date of Installation</label>
            <input type="date" id="install-date" name="install-date" required>

            <!-- FEATURES -->
            <fieldset class="checkbox-features">
                <legend>Which features did you find useful? <br>(Check all that apply)</legend>

                <label for="durability1"><input type="checkbox" id="durability1" name="features" value="durability">
                    Durability</label>
                <label for="ease1"><input type="checkbox" id="ease1" name="features" value="ease"> Ease of Use</label>
                <label for="performance1"><input type="checkbox" id="performance1" name="features" value="performance">
                    Performance</label>
                <label for="design1"><input type="checkbox" id="design1" name="features" value="design"> Design</label>
            </fieldset>
            <br>
            <!-- WRITTEN REVIEW -->
            <label for="review">Written Review (Optional)</label>
            <textarea id="review" name="review"></textarea>

            <!-- USER NAME -->
            <label for="username">Your Name (Optional)</label>
            <input type="text" id="username" name="username">

            <!-- SUBMIT BUTTON -->
            <input type="submit" value="Post Review" class="submit-btn">

        </form>
    </main>

    <footer>
        <p>©2024 🌸 Uzoka Shadrack Chinedu 🌸 Your Location</p>
        <p>Last Modification: <span id="lastModified"></span></p>
    </footer>

    <script>
        document.querySelector("#lastModified").textContent = document.lastModified;
    </script>
</body>

</html>
