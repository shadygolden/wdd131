<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Country Page - Nigeria</title>

    <meta name="description"
        content="WDD 131 – Dynamic Web Fundamentals country page about Nigeria, including data and weather.">

    <link rel="stylesheet" href="styles/place.css">

    <script src="scripts/place.js" defer></script>

</head>

<body>

    <header>
        <h1>Nigeria</h1>
    </header>

    <main>

        <!-- HERO IMAGE -->
        <section class="hero">
            <picture>
                <source srcset="images/hero-large.webp" media="(min-width: 768px)">
                <img src="images/hero-small.webp" alt="Scenic view of Nigeria">
            </picture>
        </section>

        <!-- DATA -->
        <section id="class1" class="card">
            <h2>Data</h2>
            <p><strong>Area:</strong> 923,768 sq km</p>
            <p><strong>Population:</strong> 242.4 Million</p>
            <p><strong>Capital:</strong> Abuja</p>
            <p><strong>Language:</strong> English</p>
            <p><strong>Currency:</strong> Naira</p>
            <p><strong>Time Zone:</strong> UTC+1</p>
            <p><strong>Calling Code:</strong> +234</p>
            <p><strong>Internet TLD:</strong> ng</p>
            <p><strong>Continent:</strong> Africa</p>
        </section>

        <!-- WEATHER -->
        <section class="card weather">
            <h2 class="weather-title">Weather</h2>

            <!-- SVG for mobile -->
            <img src="images/weather.svg" alt="Weather icon">

            <p>Temperature: <span id="temp">8</span>°C</p>
            <p>Wind Speed: <span id="wind">10</span> km/h</p>
            <p>Wind Chill: <span id="chill"></span></p>

        </section>

    </main>

    <footer>
        <p>© <span id="year"></span> 🌺 Uzoka Shadrack Chinedu 🌺 Nigeria</p>
        <p id="lastModified"></p>
    </footer>

</body>

</html>
